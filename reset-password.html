<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードリセット - Saikou!</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
  
  <style>
    :root {
      --cafe-beige: #f5e6d3;
      --cafe-white: #faf8f5;
      --cafe-card: #ffffff;
      --cafe-accent: #8b7355;
      --cafe-accent-dark: #6b5644;
      --cafe-dark: #2d2520;
      --cafe-light-gray: #a8a29e;
      --cafe-bg: #fefdfb;
    }
    
    body {
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, var(--cafe-beige) 0%, var(--cafe-white) 100%);
      min-height: 100vh;
    }
    
    .card {
      background: var(--cafe-card);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      padding: 2rem;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--cafe-accent) 0%, var(--cafe-accent-dark) 100%);
      color: white;
      padding: 0.875rem 2rem;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      width: 100%;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(139, 115, 85, 0.3);
    }
    
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>
  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
      <!-- Logo -->
      <div class="text-center mb-8">
        <h1 style="font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 3rem; color: var(--cafe-accent-dark); letter-spacing: 0.1em;">
          Saikou!
        </h1>
        <p style="color: var(--cafe-light-gray); font-size: 0.875rem; margin-top: 0.5rem;">
          パスワードリセット
        </p>
      </div>
      
      <!-- Reset Form -->
      <div class="card">
        <div id="loadingState" class="text-center">
          <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-gray-900 mb-4"></div>
          <p style="color: var(--cafe-light-gray);">認証情報を確認中...</p>
        </div>
        
        <div id="resetForm" class="hidden">
          <h2 class="text-xl font-bold mb-6" style="font-weight: 700; letter-spacing: 0.08em;">新しいパスワードを設定</h2>
          
          <div class="mb-4">
            <label class="block text-sm font-medium mb-2" style="color: var(--cafe-light-gray);">新しいパスワード</label>
            <input 
              type="password" 
              id="newPassword"
              placeholder="8文字以上を推奨"
              style="font-family: 'DM Sans', 'Noto Sans JP', sans-serif; font-weight: 400;"
              class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-400"
              autocomplete="new-password"
            />
          </div>
          
          <div class="mb-6">
            <label class="block text-sm font-medium mb-2" style="color: var(--cafe-light-gray);">パスワード（確認）</label>
            <input 
              type="password" 
              id="confirmPassword"
              placeholder="もう一度入力してください"
              style="font-family: 'DM Sans', 'Noto Sans JP', sans-serif; font-weight: 400;"
              class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-400"
              autocomplete="new-password"
            />
          </div>
          
          <button id="resetBtn" class="btn-primary" style="font-size: 1.125rem; font-weight: 700; letter-spacing: 0.08em;">
            パスワードを変更
          </button>
        </div>
        
        <div id="successState" class="hidden text-center">
          <div class="text-6xl mb-4">✅</div>
          <h2 class="text-xl font-bold mb-4" style="font-weight: 700; color: var(--cafe-accent-dark);">
            パスワードの変更が完了しました
          </h2>
          <p style="color: var(--cafe-light-gray); margin-bottom: 1.5rem;">
            新しいパスワードでログインしてください
          </p>
          <a href="/" class="btn-primary inline-block" style="text-decoration: none;">
            ログイン画面へ
          </a>
        </div>
        
        <div id="errorState" class="hidden text-center">
          <div class="text-6xl mb-4">❌</div>
          <h2 class="text-xl font-bold mb-4" style="font-weight: 700; color: #dc2626;">
            エラーが発生しました
          </h2>
          <p id="errorMessage" style="color: var(--cafe-light-gray); margin-bottom: 1.5rem;">
            リンクが無効または期限切れです
          </p>
          <a href="/" class="btn-primary inline-block" style="text-decoration: none;">
            ログイン画面へ戻る
          </a>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // Supabase初期化
    const SUPABASE_URL = 'https://mthfqqqukuvueprdokiq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10aGZxcXF1a3V2dWVwcmRva2lxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMTIwNzYsImV4cCI6MjA4Njc4ODA3Nn0.kCs-13w1ctUkGWE-i8Aix8wusWlFZXNZRoDjYwBzDcY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    const loadingState = document.getElementById('loadingState');
    const resetForm = document.getElementById('resetForm');
    const successState = document.getElementById('successState');
    const errorState = document.getElementById('errorState');
    const errorMessage = document.getElementById('errorMessage');
    const resetBtn = document.getElementById('resetBtn');
    
    // URLからaccess_tokenを取得
    async function checkSession() {
      try {
        // URLハッシュからトークンを取得
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        const type = hashParams.get('type');
        
        console.log('Token type:', type);
        console.log('Has access token:', !!accessToken);
        console.log('Has refresh token:', !!refreshToken);
        
        if (type === 'recovery' && accessToken && refreshToken) {
          // トークンを使ってセッションを設定
          const { data, error } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });
          
          if (error) {
            console.error('Session error:', error);
            showError('セッションの確認に失敗しました: ' + error.message);
            return;
          }
          
          console.log('Session set successfully:', data);
          showResetForm();
        } else {
          showError('無効なリセットリンクです');
        }
      } catch (error) {
        console.error('Error checking session:', error);
        showError('エラーが発生しました: ' + error.message);
      }
    }
    
    function showResetForm() {
      loadingState.classList.add('hidden');
      resetForm.classList.remove('hidden');
    }
    
    function showSuccess() {
      resetForm.classList.add('hidden');
      successState.classList.remove('hidden');
    }
    
    function showError(message) {
      loadingState.classList.add('hidden');
      errorMessage.textContent = message;
      errorState.classList.remove('hidden');
    }
    
    // パスワードリセット処理
    resetBtn.addEventListener('click', async () => {
      const newPassword = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      
      if (!newPassword || !confirmPassword) {
        alert('パスワードを入力してください');
        return;
      }
      
      if (newPassword.length < 6) {
        alert('パスワードは6文字以上で入力してください');
        return;
      }
      
      if (newPassword !== confirmPassword) {
        alert('パスワードが一致しません');
        return;
      }
      
      try {
        resetBtn.disabled = true;
        resetBtn.textContent = '変更中...';
        
        const { error } = await supabase.auth.updateUser({
          password: newPassword
        });
        
        if (error) {
          throw error;
        }
        
        showSuccess();
        
      } catch (error) {
        console.error('Error updating password:', error);
        alert('パスワードの変更に失敗しました: ' + error.message);
        resetBtn.disabled = false;
        resetBtn.textContent = 'パスワードを変更';
      }
    });
    
    // ページ読み込み時に実行
    checkSession();
  </script>
</body>
</html>
